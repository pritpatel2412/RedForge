kind = "web"
previewPath = "/"
title = "RedForge - AI Penetration Testing"
version = "1.0.0"
id = "artifacts/redforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20508

[services.development]
run = "pnpm --filter @workspace/redforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/redforge", "run", "build" ]
publicDir = "artifacts/redforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20508"
BASE_PATH = "/"
